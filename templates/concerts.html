{% extends 'base.html' %}
{% block title %}Konzerte | Urbanism{% endblock %}
{% block content %}
<main class="container">

    <div class="panel-head">
      <h2>Upcoming Shows</h2>
      <span>Live erleben</span>

<script src="{{ url_for('static', filename='js/concerts-sheet.js') }}"></script>
{% endblock %}
