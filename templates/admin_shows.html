{% extends 'base.html' %}
{% block title %}Urbanism Admin | Shows{% endblock %}
{% block content %}
<main class="container admin-shell">
  <section class="panel">
    <div class="panel-head">
      <h2>Neue Show</h2>
      <a class="subtle-link" href="{{ url_for('admin_logout') }}">Logout</a>
    </div>
    <form class="grid-form" method="post" action="{{ url_for('admin_shows') }}">
      <input type="hidden" name="action" value="create" />
      <label>
        Titel
        <input type="text" name="title" placeholder="Urbanism Live" required />
      </label>
      <label>
        Stadt
        <input type="text" name="city" placeholder="Hamburg" required />
      </label>
      <label>
        Venue
        <input type="text" name="venue" placeholder="Molotow" required />
      </label>
      <label>
        Datum
        <input type="date" name="show_date" required />
      </label>
      <label>
        Ticket URL
        <input type="url" name="ticket_url" placeholder="https://..." />
      </label>
      <label class="full">
        Notizen
        <textarea name="notes" rows="2" placeholder="Special guest, Einlass 19:00 ..."></textarea>
      </label>
      <button class="social-link" type="submit">Show speichern</button>
    </form>
  </section>

  <section class="panel">
    <div class="panel-head">
      <h2>Bestehende Shows</h2>
      <span>Editieren & löschen</span>
    </div>

    {% if shows %}
      {% for show in shows %}
      <article class="admin-card">
        <form class="grid-form" method="post" action="{{ url_for('admin_shows') }}">
          <input type="hidden" name="action" value="update" />
          <input type="hidden" name="show_id" value="{{ show.id }}" />
          <label>
            Titel
            <input type="text" name="title" value="{{ show.title }}" required />
          </label>
          <label>
            Stadt
            <input type="text" name="city" value="{{ show.city }}" required />
          </label>
          <label>
            Venue
            <input type="text" name="venue" value="{{ show.venue }}" required />
          </label>
          <label>
            Datum
            <input type="date" name="show_date" value="{{ show.show_date }}" required />
          </label>
          <label>
            Ticket URL
            <input type="url" name="ticket_url" value="{{ show.ticket_url or '' }}" />
          </label>
          <label class="full">
            Notizen
            <textarea name="notes" rows="2">{{ show.notes or '' }}</textarea>
          </label>
          <button class="social-link" type="submit">Aktualisieren</button>
        </form>
        <form method="post" action="{{ url_for('admin_shows') }}" onsubmit="return confirm('Show wirklich löschen?')">
          <input type="hidden" name="action" value="delete" />
          <input type="hidden" name="show_id" value="{{ show.id }}" />
          <button class="social-link danger" type="submit">Löschen</button>
        </form>
      </article>
      {% endfor %}
    {% else %}
      <p class="empty-state">Noch keine Shows eingetragen.</p>
    {% endif %}
  </section>
</main>
{% endblock %}
